name: PokerLedger

options:
  bundleIdPrefix: com.pokerledger
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.10
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: PokerLedger
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
      - UIInterfaceOrientationPortrait
    IPHONEOS_DEPLOYMENT_TARGET: 17.0

packages:
  PokerLedgerCore:
    path: PokerLedgerCore

targets:
  PokerLedger:
    type: application
    platform: iOS
    sources:
      - path: PokerLedger
    info:
      path: PokerLedger/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pokerledger.PokerLedger
        INFOPLIST_FILE: PokerLedger/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: ""
    dependencies:
      - package: PokerLedgerCore
        product: PokerLedgerCore
    scheme:
      testTargets: []
